name: CI

# يشغّل الفحوص الفعلية على GitHub runners (بيئة التوليد لا تملك Node، فتُنفَّذ هنا).
on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Web (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Tests
        run: npm test
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  mobile:
    name: Mobile (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install mobile deps
        working-directory: apps/mobile
        run: npm install
      - name: Mobile typecheck
        working-directory: apps/mobile
        run: npx tsc --noEmit
      - name: Expo doctor
        working-directory: apps/mobile
        run: npx expo-doctor || true
